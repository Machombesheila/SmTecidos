<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>InvenTree - Product List</title>
</head>
<body>

    <h1>📦 InvenTree - Product Inventory</h1>

    <a href="/add">➕ Add New Product</a>

    <br><br>

    <table border="1" cellpadding="8" cellspacing="0">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price (₹)</th>
                <th>Quantity</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.id}"></td>
                <td th:text="${product.name}"></td>
                <td th:text="${product.price}"></td>
                <td th:text="${product.quantity}"></td>
                <td>
                    <a th:href="@{/edit/{id}(id=${product.id})}">✏️ Edit</a>
                    &nbsp;|&nbsp;
                    <a th:href="@{/delete/{id}(id=${product.id})}"
                       onclick="return confirm('Are you sure you want to delete this product?')">
                       🗑️ Delete
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(products)}">
                <td colspan="5" style="text-align:center;">No products found. Add one!</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
