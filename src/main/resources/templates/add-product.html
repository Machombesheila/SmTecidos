<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>InvenTree - Add Product</title>
</head>
<body>

    <h1>➕ Add New Product</h1>

    <a href="/products">⬅ Back to Product List</a>

    <br><br>

    <form th:action="@{/add}" th:object="${product}" method="post">

        <label>Product Name:</label><br>
        <input type="text" th:field="*{name}" placeholder="Enter product name" />
        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></span>
        <br><br>

        <label>Price (₹):</label><br>
        <input type="number" step="0.01" th:field="*{price}" placeholder="Enter price" />
        <span th:if="${#fields.hasErrors('price')}" th:errors="*{price}" style="color:red;"></span>
        <br><br>

        <label>Quantity:</label><br>
        <input type="number" th:field="*{quantity}" placeholder="Enter quantity" />
        <span th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}" style="color:red;"></span>
        <br><br>

        <button type="submit">💾 Save Product</button>

    </form>

</body>
</html>
