<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>InvenTree - Edit Product</title>
</head>
<body>

    <h1>✏️ Edit Product</h1>

    <a href="/products">⬅ Back to Product List</a>

    <br><br>

    <form th:action="@{/edit/{id}(id=${product.id})}" th:object="${product}" method="post">

        <label>Product ID:</label><br>
        <input type="text" th:value="${product.id}" disabled />
        <br><br>

        <label>Product Name:</label><br>
        <input type="text" th:field="*{name}" />
        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></span>
        <br><br>

        <label>Price (₹):</label><br>
        <input type="number" step="0.01" th:field="*{price}" />
        <span th:if="${#fields.hasErrors('price')}" th:errors="*{price}" style="color:red;"></span>
        <br><br>

        <label>Quantity:</label><br>
        <input type="number" th:field="*{quantity}" />
        <span th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}" style="color:red;"></span>
        <br><br>

        <button type="submit">💾 Update Product</button>

    </form>

</body>
</html>
