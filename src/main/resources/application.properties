# ============================================================
# InvenTree - Application Configuration
# ============================================================

# Application Name
spring.application.name=InvenTree

# ============================================================
# MySQL Database Configuration (Active by default)
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/inventree_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# H2 In-Memory Database Configuration (for testing)
# To use H2 instead of MySQL, comment out the MySQL section
# above and uncomment the section below:
# ============================================================
# spring.datasource.url=jdbc:h2:mem:inventree_db
# spring.datasource.username=sa
# spring.datasource.password=
# spring.datasource.driver-class-name=org.h2.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# Thymeleaf Configuration
spring.thymeleaf.cache=false
